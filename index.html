<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horímetro Digital - EQS INFRA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js">
    </script>
    <style>
        :root {
            --bg: rgba(10, 10, 18, 0.1);
            --surface: rgba(20, 20, 30, 0.1);
            --surface2: rgba(26, 26, 38, 0.1);
            --border: rgba(60, 60, 80, 0.2);
            --text: #ffffff;
            --text-secondary: #ccccdd;
            --display-bg: rgba(5, 6, 8, 0.85);
            --display-text: #00ff41;
            --display-glow: rgba(0, 255, 65, 0.6);
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #f39c12;
            --yellow: #ffc107;
            --blue: #3498db;
            --blue-dark: #1a4f7a;
            --sidebar-bg: rgba(12, 12, 20, 0.1);
            --sidebar-active: rgba(30, 30, 50, 0.2);
            --sidebar-hover: rgba(25, 25, 40, 0.15);
            --sidebar-width: 220px;
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.25s ease;
            --font-display: 'Share Tech Mono', 'Courier New', 'Consolas', monospace;
            --font-body: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            --backdrop-blur: 3px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050510;
            font-family: var(--font-body);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
            position: relative;
        }

        /* ========== LOGO EQS INFRA NO CANTO SUPERIOR ESQUERDO ========== */
        .brand-logo {
            position: fixed;
            top: 20px;
            left: 28px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        .brand-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.5), 0 0 40px rgba(0, 114, 255, 0.3);
            letter-spacing: 0.5px;
        }
        .brand-logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        .brand-logo-main {
            font-weight: 800;
            font-size: 1.2rem;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(0, 180, 255, 0.6);
        }
        .brand-logo-sub {
            font-size: 0.6rem;
            color: #aabbdd;
            letter-spacing: 2px;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
        }

        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 1;
        }

        .main-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            display: flex;
            gap: 0;
            min-height: 620px;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg);
            backdrop-filter: blur(var(--backdrop-blur));
            -webkit-backdrop-filter: blur(var(--backdrop-blur));
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-top: 50px;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(calc(var(--backdrop-blur) * 1.5));
            -webkit-backdrop-filter: blur(calc(var(--backdrop-blur) * 1.5));
            display: flex;
            flex-direction: column;
            padding: 16px 0;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }
        .sidebar-section {
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4px;
        }
        .sidebar-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.7);
        }
        .generator-select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: #fff;
            font-family: var(--font-body);
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(4px);
            margin-bottom: 4px;
        }
        .generator-select option {
            background: #1a1a2e;
            color: #fff;
        }
        .btn-manage,
        .btn-pdf {
            width: 100%;
            padding: 7px 12px;
            border-radius: 8px;
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid rgba(52, 152, 219, 0.4);
            color: #fff;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all var(--transition);
            font-family: var(--font-body);
            backdrop-filter: blur(4px);
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
            margin-top: 4px;
        }
        .btn-pdf {
            background: rgba(231, 76, 60, 0.2);
            border-color: rgba(231, 76, 60, 0.4);
        }
        .btn-manage:hover,
        .btn-pdf:hover {
            filter: brightness(1.3);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        .tech-info {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 6px;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 14px;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.9rem;
            color: #e0e0f0;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            text-align: left;
            width: 100%;
            font-family: var(--font-body);
            letter-spacing: 0.2px;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
        }
        .tab-btn .tab-icon {
            font-size: 1.2rem;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
            filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.5));
        }
        .tab-btn:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }
        .tab-btn.active {
            background: var(--sidebar-active);
            color: #fff;
            font-weight: 600;
            box-shadow: inset 3px 0 0 var(--blue);
        }
        .tab-badge {
            background: var(--red);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
            margin-left: auto;
            display: none;
            animation: pulse-badge 2s infinite;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
        }
        @keyframes pulse-badge {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .tab-badge.show {
            display: inline-block;
        }

        /* ========== CONTEÚDO PRINCIPAL ========== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 22px;
            gap: 16px;
            position: relative;
            background: transparent;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-title h2 {
            font-weight: 700;
            font-size: 1.3rem;
            color: #ffffff;
            margin: 0;
            letter-spacing: -0.3px;
            text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
        }
        .header-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
        }
        .current-generator-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            font-size: 0.75rem;
            color: #ddd;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            transition: var(--transition);
            border: 2px solid transparent;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
        }
        .status-badge.running {
            background: rgba(46, 204, 113, 0.15);
            border-color: var(--green);
            color: #5dff9e;
        }
        .status-badge.stopped {
            background: rgba(150, 150, 160, 0.1);
            border-color: #888;
            color: #ccc;
        }
        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            transition: var(--transition);
        }
        .status-badge.running .status-led {
            background: #00ff41;
            box-shadow: 0 0 14px #00ff41;
            animation: ledPulse 1.2s ease-in-out infinite;
        }
        @keyframes ledPulse {
            0%,
            100% {
                box-shadow: 0 0 10px #00ff41;
            }
            50% {
                box-shadow: 0 0 22px #00ff41;
            }
        }

        /* ========== TABS ========== */
        .tab-content {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        .tab-content.active {
            display: flex;
        }

        /* ========== DISPLAY ========== */
        .display-card {
            background: var(--surface);
            backdrop-filter: blur(calc(var(--backdrop-blur) * 2));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .display-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
        }
        .horimetro-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: var(--display-bg);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.9), 0 0 0 3px rgba(20, 20, 30, 0.6), 0 0 30px rgba(0, 255, 65, 0.2);
        }
        .digit-group {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 5.5vw, 3.6rem);
            font-weight: 400;
            color: var(--display-text);
            text-shadow: 0 0 18px var(--display-glow);
            letter-spacing: 2px;
            min-width: 0.6em;
            text-align: center;
        }
        .separator {
            font-family: var(--font-display);
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            color: var(--display-text);
            opacity: 0.7;
            animation: separatorBlink 2s step-end infinite;
        }
        .display-running .separator {
            animation: separatorBlink 1s step-end infinite;
        }
        @keyframes separatorBlink {
            0%,
            100% {
                opacity: 0.9;
            }
            50% {
                opacity: 0.2;
            }
        }
        .display-unit {
            font-family: var(--font-display);
            font-size: clamp(0.8rem, 2vw, 1.1rem);
            color: var(--display-text);
            opacity: 0.7;
            margin-left: 2px;
        }

        /* ========== CONTROLES ========== */
        .controls-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all var(--transition);
            font-family: var(--font-body);
            white-space: nowrap;
            outline: none;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            text-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-start {
            background: rgba(46, 204, 113, 0.5);
            color: #fff;
            border-color: rgba(46, 204, 113, 0.7);
        }
        .btn-start:hover {
            background: rgba(46, 204, 113, 0.7);
            box-shadow: 0 6px 24px rgba(46, 204, 113, 0.4);
        }
        .btn-stop {
            background: rgba(231, 76, 60, 0.5);
            color: #fff;
            border-color: rgba(231, 76, 60, 0.7);
        }
        .btn-stop:hover {
            background: rgba(231, 76, 60, 0.7);
            box-shadow: 0 6px 24px rgba(231, 76, 60, 0.4);
        }
        .btn-reset {
            background: rgba(255, 255, 255, 0.05);
            color: #ddd;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }
        .btn-simular {
            background: rgba(243, 156, 18, 0.15);
            color: var(--orange);
            border-color: rgba(243, 156, 18, 0.4);
            font-size: 0.8rem;
            padding: 8px 14px;
        }
        .btn-simular:hover {
            background: rgba(243, 156, 18, 0.3);
            border-color: var(--orange);
        }

        /* Input de horas personalizadas */
        .custom-hours-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .custom-hours-input {
            width: 65px;
            padding: 7px 8px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: #fff;
            font-family: var(--font-body);
            font-size: 0.8rem;
            text-align: center;
            outline: none;
            backdrop-filter: blur(4px);
        }
        .custom-hours-input:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.15);
        }

        /* ========== MANUTENÇÃO ========== */
        .section-title {
            font-weight: 700;
            font-size: 1rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
        }
        .maintenance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }
        .maint-card {
            background: var(--surface2);
            backdrop-filter: blur(calc(var(--backdrop-blur) * 2));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            transition: all var(--transition);
            cursor: pointer;
        }
        .maint-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }
        .maint-card.status-ok {
            border-left: 3px solid var(--green);
        }
        .maint-card.status-warning {
            border-left: 3px solid var(--yellow);
            animation: warningGlow 2s ease-in-out infinite;
        }
        .maint-card.status-overdue {
            border-left: 3px solid var(--red);
            animation: overdueGlow 1.5s ease-in-out infinite;
            background: rgba(231, 76, 60, 0.1);
        }
        @keyframes warningGlow {
            0%,
            100% {
                box-shadow: 0 0 0px transparent;
            }
            50% {
                box-shadow: 0 0 14px rgba(255, 193, 7, 0.2);
            }
        }
        @keyframes overdueGlow {
            0%,
            100% {
                box-shadow: 0 0 0px transparent;
            }
            50% {
                box-shadow: 0 0 18px rgba(231, 76, 60, 0.25);
            }
        }
        .maint-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .maint-card-icon {
            font-size: 1.5rem;
        }
        .maint-card-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-ok .maint-card-status-dot {
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
        }
        .status-warning .maint-card-status-dot {
            background: var(--yellow);
            box-shadow: 0 0 10px var(--yellow);
        }
        .status-overdue .maint-card-status-dot {
            background: var(--red);
            box-shadow: 0 0 14px var(--red);
            animation: ledPulse 0.8s infinite;
        }
        .maint-card-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #ffffff;
            margin-bottom: 4px;
        }
        .maint-card-info {
            font-size: 0.7rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        .maint-progress-bar {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: rgba(0, 0, 0, 0.4);
            margin: 8px 0 10px;
            overflow: hidden;
        }
        .maint-progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }
        .status-ok .maint-progress-fill {
            background: var(--green);
        }
        .status-warning .maint-progress-fill {
            background: var(--yellow);
        }
        .status-overdue .maint-progress-fill {
            background: var(--red);
        }
        .maint-card-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn-small {
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            color: #ddd;
            transition: all var(--transition);
            font-family: var(--font-body);
        }
        .btn-small:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
        }
        .btn-do-maintenance {
            background: rgba(52, 152, 219, 0.3);
            border-color: rgba(52, 152, 219, 0.6);
            color: #fff;
        }
        .btn-do-maintenance:hover {
            background: rgba(52, 152, 219, 0.5);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
        }

        /* ========== HISTÓRICO ========== */
        .history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: var(--surface2);
            backdrop-filter: blur(calc(var(--backdrop-blur) * 2));
            font-size: 0.8rem;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        .history-item .h-date {
            color: var(--text-secondary);
            font-size: 0.7rem;
            min-width: 90px;
        }
        .history-item .h-item {
            font-weight: 600;
            color: #ffffff;
            flex: 1;
        }
        .history-item .h-hours {
            color: var(--display-text);
            font-family: var(--font-display);
            font-size: 0.8rem;
        }
        .history-item .h-tech {
            font-size: 0.65rem;
            color: #aaa;
        }
        .history-empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
            font-style: italic;
        }
        .btn-clear-history {
            font-size: 0.7rem;
            padding: 5px 12px;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #bbb;
            transition: all var(--transition);
            font-family: var(--font-body);
            margin-top: 8px;
            backdrop-filter: blur(4px);
        }
        .btn-clear-history:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        .modal h2 {
            margin-bottom: 12px;
            color: #fff;
        }
        .modal .form-group {
            margin-bottom: 12px;
        }
        .modal label {
            display: block;
            font-size: 0.8rem;
            color: #ccc;
            margin-bottom: 4px;
        }
        .modal input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.9rem;
            font-family: var(--font-body);
            outline: none;
        }
        .modal input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        .modal .generators-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .gen-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        .gen-item span {
            flex: 1;
            font-size: 0.85rem;
        }
        .gen-item button {
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: #ddd;
        }
        .gen-item button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        .btn-confirm {
            background: rgba(52, 152, 219, 0.5);
            border: 1px solid var(--blue);
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-confirm:hover {
            background: rgba(52, 152, 219, 0.8);
        }
        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ccc;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.8rem;
            color: #fff;
            pointer-events: auto;
            animation: toastIn 0.4s ease-out, toastOut 0.35s ease-in forwards;
            animation-delay: 0s, 3.5s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            max-width: 350px;
            backdrop-filter: blur(8px);
        }
        .toast.warning {
            background: rgba(200, 120, 0, 0.7);
            border-left: 4px solid #ffab00;
        }
        .toast.overdue {
            background: rgba(180, 30, 30, 0.7);
            border-left: 4px solid #ff5252;
        }
        .toast.success {
            background: rgba(30, 100, 30, 0.7);
            border-left: 4px solid #4caf50;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        @media (max-width: 750px) {
            .brand-logo {
                top: 10px;
                left: 12px;
            }
            .brand-logo-icon {
                width: 30px;
                height: 30px;
                font-size: 0.75rem;
            }
            .brand-logo-main {
                font-size: 0.95rem;
            }
            .brand-logo-sub {
                font-size: 0.5rem;
            }
            .main-container {
                flex-direction: column;
                margin-top: 40px;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                padding: 6px 8px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                overflow-x: auto;
                gap: 4px;
                align-items: center;
                flex-wrap: wrap;
            }
            .sidebar-section {
                border-bottom: none;
                padding: 4px;
            }
            .sidebar-nav {
                flex-direction: row;
                padding: 0;
                gap: 4px;
            }
            .tab-btn {
                padding: 7px 10px;
                font-size: 0.7rem;
                border-radius: 20px;
                gap: 5px;
            }
            .content-area {
                padding: 12px;
            }
            .horimetro-display .digit-group {
                font-size: 1.9rem;
            }
            .custom-hours-group {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <!-- LOGO EQS INFRA NO CANTO SUPERIOR ESQUERDO -->
    <div class="brand-logo">
        <div class="brand-logo-icon">EQS</div>
        <div class="brand-logo-text">
            <span class="brand-logo-main">EQS INFRA</span>
            <span class="brand-logo-sub">SOLUÇÕES EM INFRAESTRUTURA</span>
        </div>
    </div>

    <canvas id="particlesCanvas"></canvas>

    <div class="main-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">

                <div class="sidebar-label">Técnico</div>

            <div class="sidebar-section">
                <div class="sidebar-label">Gerador Ativo</div>

                <button class="btn-manage" id="btnManage">⚙ Gerenciar</button>

            <nav class="sidebar-nav">

        <main class="content-area">

                <div class="current-generator-badge" id="currentGenBadge">🔌 Nenhum gerador</div>

            <section class="tab-content active" id="tab-horimetro">
                <div class="display-card" id="displayCard">

                    <div class="horimetro-display" id="horimetroDisplay">
                        <span class="digit-group" id="hoursDisplay">00000</span>

                        <span class="digit-group" id="minutesDisplay">00</span>
                        <span class="separator">:</span>

                        <span class="display-unit">h</span>

                </div>
                <div class="controls-row">
                    <button class="btn btn-start" id="btnStart">▶ Iniciar</button>
                    <button class="btn btn-stop" id="btnStop" style="display:none;">⏹ Parar</button>

                    <div class="custom-hours-group">
                        <input type="number" class="custom-hours-input" id="customHoursInput" value="10" min="0.1" max="99999" step="0.1" placeholder="Horas">
                        <button class="btn btn-simular" id="btnSimular">⏩ Adicionar</button>

            <section class="tab-content" id="tab-manutencoes">
                <div class="section-title"><span>🔧</span> Próx. Manutenções</div>

            <section class="tab-content" id="tab-historico">
                <div class="section-title"><span>📋</span> Histórico de Manutenções</div>
                <div id="historyContent"><p class="history-empty">Nenhuma manutenção registrada ainda.</p></div>
                <button class="btn-clear-history" id="btnClearHistory" style="display:none;">🗑 Limpar histórico</button>
            </section>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div id="modalOverlay" class="modal-overlay" style="display:none;"></div>

    <script>
        (function() {
            // ========== PARTÍCULAS ==========
            const canvas = document.getElementById('particlesCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const maxParticles = 90;
            let animationFrameId;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', () => { resizeCanvas();
                initParticles(); });

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 3 + 1;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.7 + 0.3;
                    this.life = Math.random() * 600 + 300;
                    this.maxLife = this.life;
                    this.hue = Math.random() * 60 + 180;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.life--;
                    if (this.life <= 0 || this.x < -30 || this.x > canvas.width + 30 || this.y < -30 || this.y > canvas
                        .height + 30) {
                        this.reset();
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.life = this.maxLife;
                    }
                }
                draw() {
                    const alpha = this.opacity * (this.life / this.maxLife);
                    ctx.fillStyle = `hsla(${this.hue}, 70%, 65%, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    if (this.size > 2.2) {
                        ctx.fillStyle = `hsla(${this.hue}, 80%, 75%, ${alpha * 0.4})`;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size * 1.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function initParticles() {
                particles = [];
                const count = Math.min(maxParticles, Math.floor((canvas.width * canvas.height) / 10000));
                for (let i = 0; i < count; i++) particles.push(new Particle());
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update();
                    p.draw(); });
                ctx.strokeStyle = 'rgba(140, 180, 240, 0.08)';
                ctx.lineWidth = 0.6;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                animationFrameId = requestAnimationFrame(animateParticles);
            }

            resizeCanvas();
            initParticles();
            animateParticles();

            // ========== CONSTANTES ==========
            const STORAGE_KEY = 'horimetro_multigerador_v3';
            const DEFAULT_MAINTENANCE_ITEMS = [
                { id: 'oleo_motor', name: 'Troca de Óleo do Motor', intervalHours: 50, icon: '🛢️', lastDoneAtHours: 0,
                    alerted: false },
                { id: 'filtro_ar', name: 'Limpeza do Filtro de Ar', intervalHours: 25, icon: '🌬️', lastDoneAtHours: 0,
                    alerted: false },
                { id: 'filtro_combustivel', name: 'Troca do Filtro de Combustível', intervalHours: 100, icon: '⛽',
                    lastDoneAtHours: 0, alerted: false },
                { id: 'vela', name: 'Troca da Vela de Ignição', intervalHours: 200, icon: '🔌', lastDoneAtHours: 0,
                    alerted: false },
                { id: 'revisao_geral', name: 'Revisão Geral Completa', intervalHours: 300, icon: '🔧', lastDoneAtHours: 0,
                    alerted: false },
            ];

            // ========== ESTADO GLOBAL ==========
            let state = {
                technicianName: '',
                generators: [],
                activeGeneratorId: null,
            };

            // ========== REFERÊNCIAS DOM ==========
            const $hoursDisplay = document.getElementById('hoursDisplay');
            const $minutesDisplay = document.getElementById('minutesDisplay');
            const $secondsDisplay = document.getElementById('secondsDisplay');
            const $displayCard = document.getElementById('displayCard');
            const $statusBadge = document.getElementById('statusBadge');
            const $statusText = document.getElementById('statusText');
            const $btnStart = document.getElementById('btnStart');
            const $btnStop = document.getElementById('btnStop');
            const $btnReset = document.getElementById('btnReset');
            const $btnSimular = document.getElementById('btnSimular');
            const $customHoursInput = document.getElementById('customHoursInput');
            const $maintenanceGrid = document.getElementById('maintenanceGrid');
            const $historyContent = document.getElementById('historyContent');
            const $btnClearHistory = document.getElementById('btnClearHistory');
            const $toastContainer = document.getElementById('toastContainer');
            const $modalOverlay = document.getElementById('modalOverlay');
            const $tabBtns = document.querySelectorAll('.tab-btn');
            const $tabContents = document.querySelectorAll('.tab-content');
            const $manutBadge = document.getElementById('manutBadge');
            const $histBadge = document.getElementById('histBadge');
            const $generatorSelect = document.getElementById('generatorSelect');
            const $btnManage = document.getElementById('btnManage');
            const $btnPDF = document.getElementById('btnPDF');
            const $techInfo = document.getElementById('techInfo');
            const $currentGenBadge = document.getElementById('currentGenBadge');

            let displayIntervalId = null;
            let maintUpdateIntervalId = null;

            // ========== PERSISTÊNCIA ==========
            function saveState() {
                try {
                    if (state.activeGeneratorId) {
                        const gen = getActiveGenerator();
                        if (gen && gen.isRunning && gen.startTimestamp) {
                            gen.totalMilliseconds += Math.max(0, Date.now() - gen.startTimestamp);
                            gen.startTimestamp = Date.now();
                        }
                    }
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                } catch (e) {}
            }

            function loadState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) {
                        state.technicianName = '';
                        state.generators = [{
                            id: 'gen_' + Date.now(),
                            name: 'Gerador Principal',
                            totalMilliseconds: 0,
                            isRunning: false,
                            startTimestamp: null,
                            maintenanceItems: JSON.parse(JSON.stringify(DEFAULT_MAINTENANCE_ITEMS)),
                            maintenanceHistory: [],
                        }];
                        state.activeGeneratorId = state.generators[0].id;
                        saveState();
                        return;
                    }
                    const parsed = JSON.parse(raw);
                    state.technicianName = parsed.technicianName || '';
                    state.generators = parsed.generators || [];
                    state.activeGeneratorId = parsed.activeGeneratorId || (state.generators[0] ? state.generators[0]
                        .id : null);
                    state.generators.forEach(gen => {
                        if (!gen.maintenanceItems || gen.maintenanceItems.length === 0) {
                            gen.maintenanceItems = JSON.parse(JSON.stringify(
                                DEFAULT_MAINTENANCE_ITEMS));
                        } else {
                            gen.maintenanceItems = DEFAULT_MAINTENANCE_ITEMS.map(def => {
                                const saved = gen.maintenanceItems.find(s => s.id === def
                                    .id);
                                return saved ? { ...def, ...saved, alerted: false } : { ...def };
                            });
                        }
                        if (!gen.maintenanceHistory) gen.maintenanceHistory = [];
                        if (typeof gen.totalMilliseconds !== 'number') gen.totalMilliseconds = 0;
                        if (typeof gen.isRunning !== 'boolean') gen.isRunning = false;
                        if (!gen.startTimestamp) gen.startTimestamp = null;
                    });
                    if (!state.activeGeneratorId && state.generators.length > 0) {
                        state.activeGeneratorId = state.generators[0].id;
                    }
                    saveState();
                } catch (e) {
                    state.technicianName = '';
                    state.generators = [{
                        id: 'gen_' + Date.now(),
                        name: 'Gerador Principal',
                        totalMilliseconds: 0,
                        isRunning: false,
                        startTimestamp: null,
                        maintenanceItems: JSON.parse(JSON.stringify(DEFAULT_MAINTENANCE_ITEMS)),
                        maintenanceHistory: [],
                    }];
                    state.activeGeneratorId = state.generators[0].id;
                    saveState();
                }
            }

            // ========== GERADOR ATIVO ==========
            function getActiveGenerator() {
                return state.generators.find(g => g.id === state.activeGeneratorId) || null;
            }

            function switchToGenerator(genId) {
                const currentGen = getActiveGenerator();
                if (currentGen && currentGen.isRunning) {
                    stopTimerInternal(currentGen);
                }
                state.activeGeneratorId = genId;
                const newGen = getActiveGenerator();
                if (newGen && newGen.isRunning && !newGen.startTimestamp) {
                    newGen.startTimestamp = Date.now();
                }
                saveState();
                updateGeneratorSelect();
                updateAllUI();
                if (newGen && newGen.isRunning) {
                    startDisplayInterval();
                } else {
                    stopDisplayInterval();
                }
            }

            function updateGeneratorSelect() {
                $generatorSelect.innerHTML = '';
                state.generators.forEach(gen => {
                    const option = document.createElement('option');
                    option.value = gen.id;
                    option.textContent = gen.name;
                    if (gen.id === state.activeGeneratorId) option.selected = true;
                    $generatorSelect.appendChild(option);
                });
                if (state.generators.length === 0) {
                    $generatorSelect.innerHTML = '<option value="">Nenhum gerador</option>';
                }
                const activeGen = getActiveGenerator();
                $currentGenBadge.textContent = activeGen ? `🔌 ${activeGen.name}` : '🔌 Nenhum gerador';
                $techInfo.textContent = state.technicianName ? `👤 ${state.technicianName}` : '👤 Não definido';
            }

            // ========== TIMER ==========
            function getCurrentTotalMs() {
                const gen = getActiveGenerator();
                if (!gen) return 0;
                if (gen.isRunning && gen.startTimestamp) {
                    return gen.totalMilliseconds + Math.max(0, Date.now() - gen.startTimestamp);
                }
                return gen.totalMilliseconds;
            }

            function getTotalHours() {
                return getCurrentTotalMs() / 3600000;
            }

            function formatTime(ms) {
                const s = Math.floor(ms / 1000);
                return {
                    hoursStr: String(Math.floor(s / 3600)).padStart(5, '0'),
                    minutesStr: String(Math.floor((s % 3600) / 60)).padStart(2, '0'),
                    secondsStr: String(s % 60).padStart(2, '0'),
                };
            }

            function updateDisplay() {
                const f = formatTime(getCurrentTotalMs());
                $hoursDisplay.textContent = f.hoursStr;
                $minutesDisplay.textContent = f.minutesStr;
                $secondsDisplay.textContent = f.secondsStr;
            }

            function updateStatusUI() {
                const gen = getActiveGenerator();
                if (gen && gen.isRunning) {
                    $statusBadge.className = 'status-badge running';
                    $statusText.textContent = 'Em Funcionamento';
                    $displayCard.classList.add('display-running');
                    $btnStart.style.display = 'none';
                    $btnStop.style.display = 'flex';
                } else {
                    $statusBadge.className = 'status-badge stopped';
                    $statusText.textContent = 'Parado';
                    $displayCard.classList.remove('display-running');
                    $btnStart.style.display = 'flex';
                    $btnStop.style.display = 'none';
                }
            }

            function getMaintenanceStatus(item, totalHours) {
                const since = totalHours - (item.lastDoneAtHours || 0);
                const interval = item.intervalHours;
                const pct = Math.min(100, (since / interval) * 100);
                if (since >= interval) return { status: 'overdue', pct: Math.min(100, pct), since, remaining: 0 };
                if (since >= interval * 0.8) return { status: 'warning', pct, since, remaining: interval - since };
                return { status: 'ok', pct, since, remaining: interval - since };
            }

            function updateMaintenanceCards() {
                const gen = getActiveGenerator();
                if (!gen) { $maintenanceGrid.innerHTML = '';
                    $manutBadge.classList.remove('show'); return; }
                const totalHours = getTotalHours();
                $maintenanceGrid.innerHTML = '';
                let hasOverdue = false;
                gen.maintenanceItems.forEach(item => {
                    const st = getMaintenanceStatus(item, totalHours);
                    if (st.status === 'overdue') hasOverdue = true;
                    const card = document.createElement('div');
                    card.className = `maint-card status-${st.status}`;
                    card.innerHTML = `
                        <div class="maint-card-header">
                            <span class="maint-card-icon">${item.icon}</span>
                            <span class="maint-card-status-dot"></span>
                        </div>
                        <div class="maint-card-name">${item.name}</div>
                        <div class="maint-card-info">
                            Intervalo: <strong>${item.intervalHours}h</strong><br>
                            Desde última: <strong>${st.since.toFixed(1)}h</strong>
                            ${st.status === 'overdue' ? `<br><span style="color:#ff5252;">⚠ Vencido! +${(st.since - item.intervalHours).toFixed(1)}h</span>` : st.status === 'warning' ? `<br><span style="color:#ffc107;">⚠ Faltam ${st.remaining.toFixed(1)}h</span>` : `<br><span style="color:#4caf50;">✓ Faltam ${st.remaining.toFixed(1)}h</span>`}
                        </div>
                        <div class="maint-progress-bar"><div class="maint-progress-fill" style="width:${st.pct}%;"></div></div>
                        <div class="maint-card-actions">
                            <button class="btn-small btn-do-maintenance" data-id="${item.id}">✅ Registrar</button>
                            <button class="btn-small btn-edit" data-id="${item.id}">⚙ Editar</button>
                        </div>
                    `;
                    $maintenanceGrid.appendChild(card);
                });
                $manutBadge.classList.toggle('show', hasOverdue);
                $maintenanceGrid.querySelectorAll('.btn-do-maintenance').forEach(b => b.addEventListener('click',
                    () => recordMaintenance(b.dataset.id)));
                $maintenanceGrid.querySelectorAll('.btn-edit').forEach(b => b.addEventListener('click', () =>
                    openEditIntervalModal(b.dataset.id)));
            }

            function updateHistoryUI() {
                const gen = getActiveGenerator();
                if (!gen || gen.maintenanceHistory.length === 0) {
                    $historyContent.innerHTML = '<p class="history-empty">Nenhuma manutenção registrada ainda.</p>';
                    $btnClearHistory.style.display = 'none';
                    $histBadge.classList.remove('show');
                } else {
                    const ul = document.createElement('ul');
                    ul.className = 'history-list';
                    [...gen.maintenanceHistory].reverse().forEach(entry => {
                        const d = new Date(entry.dateISO);
                        const li = document.createElement('li');
                        li.className = 'history-item';
                        li.innerHTML = `
                            <span class="h-date">${d.toLocaleDateString('pt-BR')} ${d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</span>
                            <span class="h-item">${entry.itemName}</span>
                            <span class="h-hours">${entry.hoursAtMaintenance.toFixed(1)} h</span>
                            <span class="h-tech">👤 ${entry.technicianName || 'Técnico'}</span>
                        `;
                        ul.appendChild(li);
                    });
                    $historyContent.innerHTML = '';
                    $historyContent.appendChild(ul);
                    $btnClearHistory.style.display = 'inline-block';
                    $histBadge.classList.add('show');
                    $histBadge.textContent = gen.maintenanceHistory.length;
                }
            }

            function updateAllUI() {
                updateDisplay();
                updateStatusUI();
                updateMaintenanceCards();
                updateHistoryUI();
                updateGeneratorSelect();
            }

            // ========== ABAS ==========
            function switchTab(id) {
                $tabBtns.forEach(b => b.classList.remove('active'));
                $tabContents.forEach(c => c.classList.remove('active'));
                document.querySelector(`.tab-btn[data-tab="${id}"]`).classList.add('active');
                document.getElementById(`tab-${id}`).classList.add('active');
            }
            $tabBtns.forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

            // ========== CONTROLE DE TIMER ==========
            function startDisplayInterval() {
                if (displayIntervalId) return;
                displayIntervalId = setInterval(updateDisplay, 1000);
                if (!maintUpdateIntervalId) maintUpdateIntervalId = setInterval(() => { updateMaintenanceCards();
                    checkAlerts(); }, 8000);
            }

            function stopDisplayInterval() {
                if (displayIntervalId) { clearInterval(displayIntervalId);
                    displayIntervalId = null; }
            }

            function startTimer() {
                const gen = getActiveGenerator();
                if (!gen || gen.isRunning) return;
                gen.isRunning = true;
                gen.startTimestamp = Date.now();
                gen.maintenanceItems.forEach(i => i.alerted = false);
                saveState();
                updateAllUI();
                startDisplayInterval();
                showToast(`Horímetro iniciado: ${gen.name}`, 'success');
            }

            function stopTimer() {
                const gen = getActiveGenerator();
                if (!gen || !gen.isRunning) return;
                stopTimerInternal(gen);
                saveState();
                updateAllUI();
                stopDisplayInterval();
                showToast(`Horímetro parado: ${gen.name}`, 'success');
            }

            function stopTimerInternal(gen) {
                if (!gen.isRunning) return;
                gen.totalMilliseconds += Math.max(0, Date.now() - (gen.startTimestamp || Date.now()));
                gen.isRunning = false;
                gen.startTimestamp = null;
            }

            function resetTimer() {
                const gen = getActiveGenerator();
                if (!gen) return;
                gen.totalMilliseconds = 0;
                gen.isRunning = false;
                gen.startTimestamp = null;
                gen.maintenanceItems.forEach(i => { i.lastDoneAtHours = 0;
                    i.alerted = false; });
                gen.maintenanceHistory = [];
                saveState();
                updateAllUI();
                stopDisplayInterval();
                showToast(`Horímetro zerado: ${gen.name}`, 'success');
            }

            function simulateHours() {
                const gen = getActiveGenerator();
                if (!gen) return;
                const rawValue = $customHoursInput.value.trim();
                const hours = parseFloat(rawValue);
                if (isNaN(hours) || hours <= 0) {
                    showToast('Informe um valor válido de horas (ex: 5.5 ou 10).', 'warning');
                    return;
                }
                if (hours > 99999) {
                    showToast('Valor máximo permitido: 99999 horas.', 'warning');
                    return;
                }
                if (!confirm(`Adicionar ${hours} hora(s) ao horímetro de "${gen.name}"?`)) return;
                const ms = hours * 3600000;
                if (gen.isRunning) {
                    gen.totalMilliseconds += Math.max(0, Date.now() - gen.startTimestamp) + ms;
                    gen.startTimestamp = Date.now();
                } else {
                    gen.totalMilliseconds += ms;
                }
                gen.maintenanceItems.forEach(i => i.alerted = false);
                saveState();
                updateAllUI();
                checkAlerts();
                showToast(`${hours} hora(s) adicionada(s): ${gen.name}`, 'success');
                $customHoursInput.value = hours;
            }

            function recordMaintenance(itemId) {
                const gen = getActiveGenerator();
                if (!gen) return;
                const item = gen.maintenanceItems.find(i => i.id === itemId);
                if (!item) return;
                const totalHours = getTotalHours();
                gen.maintenanceHistory.push({
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
                    dateISO: new Date().toISOString(),
                    itemName: item.name,
                    hoursAtMaintenance: totalHours,
                    technicianName: state.technicianName || 'Técnico',
                    generatorName: gen.name,
                });
                item.lastDoneAtHours = totalHours;
                item.alerted = false;
                saveState();
                updateAllUI();
                showToast(`✅ Manutenção registrada: ${item.name}`, 'success');
                playBeep();
            }

            function openEditIntervalModal(itemId) {
                const gen = getActiveGenerator();
                if (!gen) return;
                const item = gen.maintenanceItems.find(i => i.id === itemId);
                if (!item) return;
                $modalOverlay.innerHTML = `
                    <div class="modal">
                        <h2>Editar Intervalo</h2>
                        <p><strong>${item.name}</strong><br>Novo intervalo (horas):</p>
                        <input type="number" id="modalIntervalInput" value="${item.intervalHours}" min="1" max="9999">
                        <div class="modal-buttons">
                            <button class="btn-cancel" id="modalCancel">Cancelar</button>
                            <button class="btn-confirm" id="modalConfirm">Salvar</button>
                        </div>
                    </div>`;
                $modalOverlay.style.display = 'flex';
                document.getElementById('modalCancel').onclick = closeModal;
                document.getElementById('modalConfirm').onclick = () => {
                    const v = parseInt(document.getElementById('modalIntervalInput').value, 10);
                    if (isNaN(v) || v < 1) { showToast('Valor inválido', 'warning'); return; }
                    item.intervalHours = v;
                    item.alerted = false;
                    saveState();
                    updateAllUI();
                    closeModal();
                    showToast(`Intervalo atualizado para ${v}h`, 'success');
                };
                $modalOverlay.onclick = e => { if (e.target === $modalOverlay) closeModal(); };
            }

            function closeModal() { $modalOverlay.style.display = 'none';
                $modalOverlay.innerHTML = ''; }

            // ========== GERENCIAMENTO ==========
            function openManageModal() {
                let html = `
                    <div class="modal">
                        <h2>Gerenciar Técnico e Geradores</h2>
                        <div class="form-group">
                            <label>Nome do Técnico Responsável</label>
                            <input type="text" id="inputTechName" value="${escapeHtml(state.technicianName)}" placeholder="Nome do técnico">
                        </div>
                        <div class="form-group">
                            <label>Geradores Cadastrados</label>
                            <div class="generators-list" id="genListModal">`;
                state.generators.forEach(gen => {
                    html += `
                        <div class="gen-item">
                            <span>${escapeHtml(gen.name)}</span>
                            <button onclick="window._editGenName('${gen.id}')">✏️</button>
                            <button onclick="window._removeGen('${gen.id}')">🗑</button>
                        </div>`;
                });
                html += `</div>
                        </div>
                        <div class="form-group">
                            <input type="text" id="inputNewGenName" placeholder="Nome do novo gerador">
                            <button class="btn-confirm" id="btnAddGen" style="margin-top:6px;">➕ Adicionar Gerador</button>
                        </div>
                        <div class="modal-buttons">
                            <button class="btn-cancel" id="modalCancel">Fechar</button>
                        </div>
                    </div>`;
                $modalOverlay.innerHTML = html;
                $modalOverlay.style.display = 'flex';
                document.getElementById('modalCancel').onclick = closeModal;
                document.getElementById('btnAddGen').onclick = () => {
                    const name = document.getElementById('inputNewGenName').value.trim();
                    if (!name) { showToast('Informe o nome do gerador.', 'warning'); return; }
                    const newGen = {
                        id: 'gen_' + Date.now(),
                        name: name,
                        totalMilliseconds: 0,
                        isRunning: false,
                        startTimestamp: null,
                        maintenanceItems: JSON.parse(JSON.stringify(DEFAULT_MAINTENANCE_ITEMS)),
                        maintenanceHistory: [],
                    };
                    state.generators.push(newGen);
                    if (!state.activeGeneratorId) state.activeGeneratorId = newGen.id;
                    saveState();
                    updateAllUI();
                    openManageModal();
                    showToast(`Gerador "${name}" adicionado.`, 'success');
                };
                document.getElementById('inputTechName').addEventListener('change', function() {
                    state.technicianName = this.value.trim();
                    saveState();
                    updateGeneratorSelect();
                    showToast('Técnico atualizado.', 'success');
                });
                $modalOverlay.onclick = e => { if (e.target === $modalOverlay) closeModal(); };

                window._editGenName = function(genId) {
                    const gen = state.generators.find(g => g.id === genId);
                    if (!gen) return;
                    const newName = prompt('Novo nome do gerador:', gen.name);
                    if (newName && newName.trim()) {
                        gen.name = newName.trim();
                        saveState();
                        updateAllUI();
                        openManageModal();
                        showToast('Nome atualizado.', 'success');
                    }
                };
                window._removeGen = function(genId) {
                    if (state.generators.length <= 1) {
                        showToast('É necessário pelo menos um gerador.', 'warning');
                        return;
                    }
                    if (confirm('Remover este gerador e todos os seus dados?')) {
                        state.generators = state.generators.filter(g => g.id !== genId);
                        if (state.activeGeneratorId === genId) {
                            state.activeGeneratorId = state.generators[0] ? state.generators[0].id : null;
                        }
                        saveState();
                        updateAllUI();
                        openManageModal();
                        showToast('Gerador removido.', 'success');
                    }
                };
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ========== GERAÇÃO DE PDF ==========
            function generatePDF() {
                const gen = getActiveGenerator();
                if (!gen) {
                    showToast('Selecione um gerador para gerar o relatório.', 'warning');
                    return;
                }
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const totalHours = getTotalHours();
                const formatted = formatTime(getCurrentTotalMs());
                const now = new Date();

                doc.setFontSize(18);
                doc.text('Relatório de Horímetro', 14, 22);
                doc.setFontSize(11);
                doc.text(`Gerador: ${gen.name}`, 14, 32);
                doc.text(`Técnico Responsável: ${state.technicianName || 'Não definido'}`, 14, 39);
                doc.text(`Data/Hora: ${now.toLocaleString('pt-BR')}`, 14, 46);
                doc.text(`Horas Totais: ${formatted.hoursStr}:${formatted.minutesStr}:${formatted.secondsStr}`, 14, 53);
                doc.text(`Status: ${gen.isRunning ? 'Em funcionamento' : 'Parado'}`, 14, 60);

                const maintenanceRows = gen.maintenanceItems.map(item => {
                    const st = getMaintenanceStatus(item, totalHours);
                    let status = 'OK';
                    if (st.status === 'warning') status = 'Próximo';
                    if (st.status === 'overdue') status = 'Vencido';
                    return [
                        item.name,
                        `${item.intervalHours}h`,
                        `${st.since.toFixed(1)}h`,
                        status
                    ];
                });

                doc.autoTable({
                    startY: 68,
                    head: [
                        ['Manutenção', 'Intervalo', 'Desde Última', 'Status']
                    ],
                    body: maintenanceRows,
                    theme: 'grid',
                    headStyles: { fillColor: [41, 128, 185] },
                });

                if (gen.maintenanceHistory.length > 0) {
                    const historyY = doc.lastAutoTable.finalY + 10;
                    doc.setFontSize(14);
                    doc.text('Histórico de Manutenções Realizadas', 14, historyY);
                    const historyRows = gen.maintenanceHistory.map(entry => {
                        const d = new Date(entry.dateISO);
                        return [
                            d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit',
                                minute: '2-digit' }),
                            entry.itemName,
                            `${entry.hoursAtMaintenance.toFixed(1)}h`,
                            entry.technicianName || 'Técnico'
                        ];
                    });
                    doc.autoTable({
                        startY: historyY + 5,
                        head: [
                            ['Data', 'Manutenção', 'Horas no momento', 'Técnico']
                        ],
                        body: historyRows,
                        theme: 'grid',
                        headStyles: { fillColor: [39, 174, 96] },
                    });
                }

                doc.save(`relatorio_${gen.name.replace(/\s+/g, '_')}.pdf`);
                showToast('Relatório PDF gerado com sucesso!', 'success');
            }

            // ========== ALERTAS ==========
            function checkAlerts() {
                const gen = getActiveGenerator();
                if (!gen) return;
                const totalHours = getTotalHours();
                gen.maintenanceItems.forEach(item => {
                    const since = totalHours - (item.lastDoneAtHours || 0);
                    if (since >= item.intervalHours && !item.alerted) {
                        item.alerted = true;
                        saveState();
                        showToast(`🚨 Vencido: ${item.name}`, 'overdue');
                        playBeep();
                    } else if (since >= item.intervalHours * 0.8 && since < item.intervalHours && !item.alerted) {
                        item.alerted = true;
                        saveState();
                        showToast(`⚠ Próximo: ${item.name}`, 'warning');
                        playBeep();
                    }
                });
            }

            // ========== TOAST / SOM ==========
            function showToast(msg, type) {
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                t.textContent = msg;
                $toastContainer.appendChild(t);
                setTimeout(() => t.remove(), 4000);
            }

            function playBeep() {
                try {
                    const ctx = new(window.AudioContext || window.webkitAudioContext)();
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.connect(g);
                    g.connect(ctx.destination);
                    o.type = 'square';
                    o.frequency.value = 700;
                    g.gain.value = 0.10;
                    o.start();
                    o.stop(ctx.currentTime + 0.15);
                } catch (e) {}
            }

            // ========== EVENTOS ==========
            $btnStart.addEventListener('click', startTimer);
            $btnStop.addEventListener('click', stopTimer);
            $btnReset.addEventListener('click', () => { if (confirm(
                    'Zerar horímetro e manutenções deste gerador?')) resetTimer(); });
            $btnSimular.addEventListener('click', simulateHours);
            // Permite pressionar Enter no campo de horas para adicionar
            $customHoursInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    simulateHours();
                }
            });
            $btnClearHistory.addEventListener('click', () => {
                const gen = getActiveGenerator();
                if (gen && confirm('Limpar histórico deste gerador?')) {
                    gen.maintenanceHistory = [];
                    saveState();
                    updateHistoryUI();
                    showToast('Histórico limpo.', 'success');
                }
            });
            $generatorSelect.addEventListener('change', () => {
                switchToGenerator($generatorSelect.value);
            });
            $btnManage.addEventListener('click', openManageModal);
            $btnPDF.addEventListener('click', generatePDF);
            document.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.code === 'Space') { e.preventDefault();
                    getActiveGenerator()?.isRunning ? stopTimer() : startTimer(); }
            });

            // ========== INIT ==========
            function init() {
                loadState();
                const gen = getActiveGenerator();
                if (gen && gen.isRunning) {
                    gen.startTimestamp = Date.now();
                    gen.maintenanceItems.forEach(i => i.alerted = false);
                    saveState();
                }
                updateAllUI();
                if (gen && gen.isRunning) startDisplayInterval();
                checkAlerts();
                if (!maintUpdateIntervalId) maintUpdateIntervalId = setInterval(() => { updateMaintenanceCards();
                    checkAlerts(); }, 10000);
                switchTab('horimetro');
            }

            window.addEventListener('beforeunload', () => {
                const gen = getActiveGenerator();
                if (gen && gen.isRunning) {
                    gen.totalMilliseconds += Math.max(0, Date.now() - (gen.startTimestamp || Date.now()));
                    gen.startTimestamp = Date.now();
                    saveState();
                }
                stopDisplayInterval();
                if (maintUpdateIntervalId) clearInterval(maintUpdateIntervalId);
                cancelAnimationFrame(animationFrameId);
            });

            init();
        })();
    </script>
</body>
</html>
